<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#08080F" />
    <meta name="description" content="PushQuest — Combats de boss avec de vraies pompes. Dark Souls meets Personal Trainer." />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PushQuest — Combats de Boss" />
    <meta property="og:description" content="Bats des boss avec de vraies pompes. Chaque rep = 1 degat. Dark Souls meets Personal Trainer." />
    <meta property="og:image" content="%sveltekit.assets%/icons/icon-512.png" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:site_name" content="PushQuest" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PushQuest — Combats de Boss" />
    <meta name="twitter:description" content="Bats des boss avec de vraies pompes. Chaque rep = 1 degat." />
    <meta name="twitter:image" content="%sveltekit.assets%/icons/icon-512.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PushQuest" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icons/apple-touch-icon.png" />

    <!-- Analytics (Plausible — privacy-friendly, no cookies) -->
    <script defer data-domain="pushquest.app" src="https://plausible.io/js/script.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Oswald:wght@700;900&display=swap" rel="stylesheet" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
