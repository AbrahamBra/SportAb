<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#08080F" />
  <title>PushQuest — Hors ligne</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #08080F; color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      text-align: center; padding: 2rem;
    }
    .code {
      font-family: 'Oswald', 'Arial Black', sans-serif;
      font-size: 4rem; font-weight: 900;
      color: #E63946; letter-spacing: 6px;
      text-shadow: 0 0 30px rgba(230,57,70,0.5);
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.1rem; font-weight: 900;
      letter-spacing: 4px; text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    p {
      font-family: monospace; font-size: 0.7rem;
      color: rgba(255,255,255,0.45); letter-spacing: 2px;
      margin-bottom: 2rem; line-height: 1.6;
    }
    button {
      padding: 0.9rem 2rem; background: #E63946; color: #fff;
      border: none; border-radius: 14px; font-weight: 900;
      font-size: 0.8rem; letter-spacing: 4px; text-transform: uppercase;
      cursor: pointer; transition: all 0.15s;
      box-shadow: 0 0 20px rgba(230,57,70,0.3);
    }
    button:hover { background: #C1121F; }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="code">OFFLINE</div>
  <h1>Connexion perdue</h1>
  <p>
    Verifie ta connexion internet<br/>
    et reessaye. Tes donnees locales<br/>
    sont sauvegardees.
  </p>
  <button onclick="window.location.reload()">REESSAYER</button>
</body>
</html>
